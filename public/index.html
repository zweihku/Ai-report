<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Pulse | AI 领域每日脉搏</title>
<link rel="stylesheet" href="/css/style.css">
<script src="https://d3js.org/d3.v7.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
</head>
<body>
  <header class="site-header">
    <div class="header-inner">
      <div class="logo">
        <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
        <h1>AI Pulse</h1>
      </div>
      <p class="subtitle">AI 领域每日脉搏 · 关键词热力追踪</p>
      <div class="header-meta">
        <span class="window-label" id="windowLabel">数据窗口加载中...</span>
      </div>
    </div>
  </header>

  <main class="container">
    <!-- 今日日报入口 -->
    <section class="section" id="todaySection">
      <a class="today-card" id="todayCard" href="#">
        <div class="today-left">
          <div class="today-date">
            <span class="today-day" id="todayDay">--</span>
            <div class="today-meta">
              <span class="today-month" id="todayMonth">--</span>
              <span class="today-weekday" id="todayWeekday">--</span>
            </div>
          </div>
        </div>
        <div class="today-right">
          <div class="today-label">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>
            今日 AI 日报
          </div>
          <div class="today-tags" id="todayTags"></div>
          <span class="today-arrow">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>
          </span>
        </div>
      </a>
    </section>

    <!-- 历史日报入口 -->
    <section class="section" id="historySection">
      <div class="section-header">
        <h2>
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
          历史日报
        </h2>
        <button class="toggle-btn" id="calendarToggle">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg>
          展开日历
        </button>
      </div>
      <div class="calendar-wrap" id="calendarWrap">
        <div class="calendar" id="calendar"></div>
      </div>
    </section>

    <!-- 关键词热力图 -->
    <section class="section" id="heatmapSection">
      <div class="section-header">
        <h2>
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>
          全网 AI 关键词热力图
        </h2>
        <div class="heat-scale"><span class="cold">低热度</span><span class="bar"></span><span class="hot">高热度</span></div>
      </div>
      <div class="heatmap-container" id="heatmap"></div>
      <div class="heatmap-tip">悬停高亮关联 · 拖拽节点</div>
    </section>

    <!-- 搜索趋势图 -->
    <section class="section" id="trendsSection">
      <div class="section-header">
        <h2>
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
          关键词搜索趋势
        </h2>
      </div>
      <div class="chart-container">
        <canvas id="trendChart"></canvas>
      </div>
    </section>
  </main>

  <footer class="site-footer">
    <p>AI Pulse · 由 Claude 自动化生成</p>
  </footer>

  <!-- 日报弹出层 -->
  <div class="report-overlay" id="reportOverlay">
    <div class="report-paper" id="reportPaper">
      <button class="report-close" id="reportClose">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
      <iframe class="report-iframe" id="reportIframe" src="about:blank"></iframe>
    </div>
  </div>

  <div class="tooltip" id="tooltip"></div>

  <script src="/js/main.js"></script>
</body>
</html>
